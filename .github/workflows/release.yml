name: Release

# Cross-compiles the action's binary and publishes a GitHub Release for any
# tag matching `v*.*.*`. Also force-updates the matching major tag (e.g. v1)
# and its release so users can pin via `@v1`.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create and release (e.g. v0.1.0). Must be vMAJOR.MINOR.PATCH.'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            if git rev-parse --verify "refs/tags/$tag" > /dev/null 2>&1; then
              echo "tag $tag already exists locally"
            else
              git tag "$tag"
              git push origin "$tag"
            fi
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi

          case "$tag" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "::error::tag '$tag' must match vMAJOR.MINOR.PATCH"
              exit 1
              ;;
          esac

          major="${tag%%.*}" # v1.2.3 -> v1

          echo "tag=$tag"     >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "resolved tag=$tag major=$major"

      - name: Build x86_64-linux
        run: |
          set -e
          mkdir -p release
          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux-gnu
          cp zig-out/bin/github-user-summary-cards release/github-user-summary-cards-x86_64-linux
          (cd release && sha256sum github-user-summary-cards-x86_64-linux > github-user-summary-cards-x86_64-linux.sha256)

      - name: Publish release for the full tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -e
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" release/* --clobber
          else
            gh release create "$TAG" release/* \
              --title "$TAG" \
              --generate-notes
          fi

      - name: Move major tag and (re)publish its release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          MAJOR: ${{ steps.tag.outputs.major }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR" "$TAG"
          git push -f origin "$MAJOR"

          if gh release view "$MAJOR" > /dev/null 2>&1; then
            gh release delete "$MAJOR" --yes --cleanup-tag=false
          fi
          gh release create "$MAJOR" release/* \
            --title "$MAJOR (latest $TAG)" \
            --notes "Rolling release for the \`$MAJOR\` major version. Currently points at [$TAG](../$TAG)."
