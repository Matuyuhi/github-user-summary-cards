name: Profile Summary Cards

# Self-dogfood: generates cards for the repo owner using the action defined in
# this repository, and force-pushes them to a dedicated branch via AUTO_PUSH.
# Doubles as a smoke test on every change to the action / build / sources.

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - .github/workflows/profile-cards.yml
      - action.yml
      - build.zig
      - build.zig.zon
      - src/**

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate and push cards
        uses: ./
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THEME: tokyonight
          ALL_TIME: 'true'
          HUMANIZE: 'true'
          AUTO_PUSH: 'true'
          # PUSH_BRANCH defaults to "profile-summary-card-output"
