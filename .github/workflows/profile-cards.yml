name: Profile Summary Cards

# Self-dogfood: generates cards for the repo owner using the action defined in
# this repository, then commits them onto master at profile-summary-card/.
# Doubles as a smoke test on every change to the action / build / sources.

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - .github/workflows/profile-cards.yml
      - action.yml
      - build.zig
      - build.zig.zon
      - src/**

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.1

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build binary
        run: zig build -Doptimize=ReleaseSafe

      - name: Generate cards
        uses: ./
        with:
          BIN_PATH: ${{ github.workspace }}/zig-out/bin/github-user-summary-cards
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THEME: tokyonight
          ALL_TIME: 'true'
          HUMANIZE: 'true'
          OUTPUT_DIR: profile-summary-card
          # AUTO_PUSH intentionally omitted: we commit on master at a path below.

      - name: Commit cards to master
        env:
          OUTPUT_DIR: profile-summary-card
        run: |
          set -e

          if [ ! -d "$OUTPUT_DIR" ] || [ -z "$(ls -A "$OUTPUT_DIR" 2>/dev/null)" ]; then
            echo "no SVGs to commit"
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Force-add in case the dir is gitignored.
          git add -fA -- "$OUTPUT_DIR"

          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi

          git commit -m "chore: regenerate profile summary cards"
          git push origin HEAD:master
