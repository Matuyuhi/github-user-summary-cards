name: GitHub User Summary Cards
description: Generate SVG profile summary cards from a GitHub user's stats.
author: matuyuhi
branding:
  icon: bar-chart-2
  color: blue
inputs:
  USERNAME:
    description: GitHub username (defaults to the repo owner)
    required: false
    default: ${{ github.repository_owner }}
  GITHUB_TOKEN:
    description: GitHub token. When the token belongs to USERNAME, private repos and contributions are included.
    required: false
    default: ''
  THEME:
    description: Theme name (default, dracula, nord_dark, tokyonight, gruvbox, solarized_light)
    required: false
    default: default
  EXCLUDE:
    description: Comma-separated languages to exclude
    required: false
    default: ''
  ALL_TIME:
    description: When truthy (1/true/yes/on), aggregate commits / contributions / streak across the user's entire history (issues N+1 GraphQL queries).
    required: false
    default: ''
  CARDS:
    description: "Comma-separated list of cards to render. Names: profile, repos-per-language, most-commit-language, stats, contribution-heatmap, streak, top-repos. Empty = all."
    required: false
    default: ''
  TOP_LANGS:
    description: Top N languages shown in donut cards (1..20).
    required: false
    default: '6'
  TOP_REPOS:
    description: Number of repos shown in top-repos card (1..20).
    required: false
    default: '6'
  INCLUDE_FORKS:
    description: When truthy, include forked repositories in repo / language tallies.
    required: false
    default: ''
  BIO_MAX:
    description: Max bio characters shown on profile card (8..400).
    required: false
    default: '56'
  NO_AVATAR_EMBED:
    description: When truthy, skip avatar fetch / base64 embedding (smaller SVG, but the avatar will not render when the SVG is loaded as <img src=...>).
    required: false
    default: ''
  HUMANIZE:
    description: When truthy, abbreviate large numbers (1234 -> 1.2k, 3450000 -> 3.5m).
    required: false
    default: ''
  OUTPUT_DIR:
    description: Directory to write SVGs into
    required: false
    default: profile-summary-card-output
  AUTO_PUSH:
    description: "When truthy, force-push the generated SVGs to PUSH_BRANCH. Requires the workflow to grant `permissions: contents: write` and to have run actions/checkout first."
    required: false
    default: ''
  PUSH_BRANCH:
    description: Branch to force-push the generated SVGs to (orphan branch — only the SVGs live there). Used only when AUTO_PUSH is truthy.
    required: false
    default: profile-summary-card-output
  COMMIT_MESSAGE:
    description: 'Commit message used by AUTO_PUSH. Empty falls back to "chore: update profile summary cards".'
    required: false
    default: ''
  COMMIT_USER_NAME:
    description: Git committer name used by AUTO_PUSH.
    required: false
    default: 'github-actions[bot]'
  COMMIT_USER_EMAIL:
    description: Git committer email used by AUTO_PUSH.
    required: false
    default: '41898282+github-actions[bot]@users.noreply.github.com'
  BIN_PATH:
    description: 'Path to a prebuilt github-user-summary-cards binary. When set, the action runs it directly instead of downloading from a GitHub Release. Useful for local action references (`uses: ./`) and for pinning to a custom build.'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: Resolve binary
      shell: bash
      env:
        BIN_PATH_INPUT: ${{ inputs.BIN_PATH }}
        ACTION_REF: ${{ github.action_ref }}
        ACTION_REPOSITORY: ${{ github.action_repository }}
      run: |
        set -e

        if [ -n "$BIN_PATH_INPUT" ]; then
          if [ ! -x "$BIN_PATH_INPUT" ]; then
            echo "::error::BIN_PATH '$BIN_PATH_INPUT' does not exist or is not executable"
            exit 1
          fi
          echo "GUSC_BIN=$BIN_PATH_INPUT" >> "$GITHUB_ENV"
          echo "using prebuilt binary at $BIN_PATH_INPUT"
          exit 0
        fi

        if [ -z "$ACTION_REF" ]; then
          echo "::error::action ref is empty (likely \`uses: ./\`). Provide BIN_PATH input pointing at a prebuilt binary, or use a tag like \`uses: matuyuhi/github-user-summary-cards@v1\`."
          exit 1
        fi

        case "$ACTION_REF" in
          v[0-9]*) ;;
          *)
            echo "::error::action ref '$ACTION_REF' is not a release tag. Use a tag like \`@v1\` or \`@v0.1.0\`, or provide BIN_PATH for branch / SHA references."
            exit 1
            ;;
        esac

        repo="${ACTION_REPOSITORY:-matuyuhi/github-user-summary-cards}"
        os=$(uname -s | tr '[:upper:]' '[:lower:]')
        arch=$(uname -m)
        case "$os/$arch" in
          linux/x86_64) asset="github-user-summary-cards-x86_64-linux" ;;
          *)
            echo "::error::no prebuilt binary published for $os/$arch. Build locally and pass BIN_PATH input."
            exit 1
            ;;
        esac

        url="https://github.com/$repo/releases/download/$ACTION_REF/$asset"
        target="$RUNNER_TEMP/github-user-summary-cards"
        echo "downloading $url"
        curl -fsSL --retry 3 -o "$target" "$url"
        chmod +x "$target"
        echo "GUSC_BIN=$target" >> "$GITHUB_ENV"

    - name: Generate cards
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
        THEME: ${{ inputs.THEME }}
        EXCLUDE: ${{ inputs.EXCLUDE }}
        ALL_TIME: ${{ inputs.ALL_TIME }}
        CARDS: ${{ inputs.CARDS }}
        TOP_LANGS: ${{ inputs.TOP_LANGS }}
        TOP_REPOS: ${{ inputs.TOP_REPOS }}
        INCLUDE_FORKS: ${{ inputs.INCLUDE_FORKS }}
        BIO_MAX: ${{ inputs.BIO_MAX }}
        NO_AVATAR_EMBED: ${{ inputs.NO_AVATAR_EMBED }}
        HUMANIZE: ${{ inputs.HUMANIZE }}
        OUTPUT_DIR: ${{ github.workspace }}/${{ inputs.OUTPUT_DIR }}
      run: '"$GUSC_BIN" "${{ inputs.USERNAME }}"'
    - name: Push cards to branch
      shell: bash
      env:
        AUTO_PUSH: ${{ inputs.AUTO_PUSH }}
        PUSH_BRANCH: ${{ inputs.PUSH_BRANCH }}
        COMMIT_MESSAGE: ${{ inputs.COMMIT_MESSAGE }}
        COMMIT_USER_NAME: ${{ inputs.COMMIT_USER_NAME }}
        COMMIT_USER_EMAIL: ${{ inputs.COMMIT_USER_EMAIL }}
        OUTPUT_DIR: ${{ github.workspace }}/${{ inputs.OUTPUT_DIR }}
        WORKSPACE: ${{ github.workspace }}
      run: |
        set -e
        case "${AUTO_PUSH:-}" in
          1|true|yes|on|TRUE|YES|ON|True|Yes|On) ;;
          *) echo "AUTO_PUSH not set, skipping push"; exit 0 ;;
        esac

        if [ ! -d "$OUTPUT_DIR" ] || [ -z "$(ls -A "$OUTPUT_DIR" 2>/dev/null)" ]; then
          echo "no SVGs to push (output dir empty: $OUTPUT_DIR)"
          exit 0
        fi

        target="${PUSH_BRANCH:-profile-summary-card-output}"
        msg="${COMMIT_MESSAGE:-chore: update profile summary cards}"

        cd "$WORKSPACE"

        if ! git rev-parse --git-dir > /dev/null 2>&1; then
          echo "::error::workspace is not a git checkout. Add 'actions/checkout' before this action."
          exit 1
        fi

        # Stage SVGs in a temp dir before touching anything git-related.
        staging=$(mktemp -d)
        cp -a "$OUTPUT_DIR"/. "$staging/"

        # Build the orphan commit in an isolated worktree so the main checkout
        # (which still hosts action.yml, sources, .zig-cache, zig-out etc.) is
        # never mutated. This avoids two failure modes from the previous
        # implementation: leaking untracked build artifacts into the commit,
        # and stripping action.yml from the workspace mid-job.
        wt=$(mktemp -d)/gusc-wt
        git worktree add --detach "$wt" HEAD > /dev/null
        trap 'git worktree remove --force "$wt" 2>/dev/null || true' EXIT

        cd "$wt"
        git checkout --orphan "$target" > /dev/null 2>&1
        # Drop everything inherited from the parent commit, both index and tree.
        git rm -rf --cached . > /dev/null 2>&1 || true
        find . -mindepth 1 -maxdepth 1 -not -name '.git' -exec rm -rf {} +

        cp -a "$staging"/. .

        git add -A
        if git diff --cached --quiet; then
          echo "no changes to commit"
          exit 0
        fi

        git \
          -c user.name="$COMMIT_USER_NAME" \
          -c user.email="$COMMIT_USER_EMAIL" \
          commit -m "$msg" > /dev/null
        git push -f origin "$target"
        echo "pushed $(git ls-tree HEAD | wc -l | tr -d ' ') files to '$target'"
